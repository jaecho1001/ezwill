services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ezwill
      POSTGRES_PASSWORD: ezwill_dev
      POSTGRES_DB: caselawvision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      # -h 127.0.0.1 forces a TCP check so the DB only reports healthy once the
      # real server accepts connections — not during initdb's socket-only phase,
      # which a bare `pg_isready` would pass while TCP is still refused.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ezwill -d caselawvision"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://ezwill:ezwill_dev@db:5432/caselawvision
      DEFAULT_SCHEMA: firm_demo
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      ANTHROPIC_INTAKE_MODEL: ${ANTHROPIC_INTAKE_MODEL:-claude-sonnet-4-5}
      AI_INTAKE_RATE_WINDOW_SECS: ${AI_INTAKE_RATE_WINDOW_SECS:-60}
      AI_INTAKE_RATE_MAX_REQS: ${AI_INTAKE_RATE_MAX_REQS:-20}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-vaturi2026}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_API_URL is baked into the Next.js rewrite at BUILD time
        # (.next/routes-manifest.json). `next start` never re-reads it, so a
        # runtime env var would be a no-op — change the target here and rebuild.
        NEXT_PUBLIC_API_URL: http://backend:8003
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
