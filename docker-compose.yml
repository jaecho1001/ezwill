services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ezwill
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: caselawvision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces a TCP check so the DB only reports healthy once the
      # real server accepts connections — not during initdb's socket-only phase,
      # which a bare `pg_isready` would pass while TCP is still refused.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ezwill -d caselawvision"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build: ./backend
    restart: "no"
    command: ["python", "scripts/run_migrations.py"]
    environment:
      DATABASE_URL: postgresql://ezwill:${POSTGRES_PASSWORD}@db:5432/caselawvision
      DEFAULT_SCHEMA: ${DEFAULT_SCHEMA:-firm_demo}
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://ezwill:${POSTGRES_PASSWORD}@db:5432/caselawvision
      DEFAULT_SCHEMA: ${DEFAULT_SCHEMA:-firm_demo}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      ANTHROPIC_INTAKE_MODEL: ${ANTHROPIC_INTAKE_MODEL:-claude-sonnet-4-5}
      AI_INTAKE_RATE_WINDOW_SECS: ${AI_INTAKE_RATE_WINDOW_SECS:-60}
      AI_INTAKE_RATE_MAX_REQS: ${AI_INTAKE_RATE_MAX_REQS:-20}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?set DASHBOARD_PASSWORD in .env}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?set AUTH_SESSION_SECRET in .env — openssl rand -hex 32}
      # The HttpOnly dashboard session cookie is Secure (HTTPS-only) by default;
      # local http dev overrides this to false in docker-compose.override.yml.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      FIRM_EMAIL: ${FIRM_EMAIL:-lawyers@vaturicho.com}
      FIRM_NAME: ${FIRM_NAME:-Vaturi & Cho LLP}
      FIRM_PHONE: ${FIRM_PHONE:-+14166614529}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@ezwill.app}
      FROM_NAME: ${FROM_NAME:-EZWill}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      GHL_API_KEY: ${GHL_API_KEY:-}
      GHL_LOCATION_ID: ${GHL_LOCATION_ID:-}
      NOTIFICATION_MODE: ${NOTIFICATION_MODE:-stdout}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_API_URL is baked into the Next.js rewrite at BUILD time
        # (.next/routes-manifest.json). `next start` never re-reads it, so a
        # runtime env var would be a no-op — change the target here and rebuild.
        NEXT_PUBLIC_API_URL: http://backend:8003
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
